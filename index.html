<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Workout Tracker</h1>
      <div id="user-selector"></div>
    </header>

    <nav id="main-nav">
      <button class="nav-btn active" data-view="workout">Entreno</button>
      <button class="nav-btn" data-view="history">Historial</button>
      <button class="nav-btn" data-view="progress">Progreso</button>
      <button class="nav-btn" data-view="settings">Config</button>
    </nav>

    <main id="main-content">
      <section id="view-workout" class="view active"></section>
      <section id="view-history" class="view"></section>
      <section id="view-progress" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-content"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/history.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
